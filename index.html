<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planechase</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar collapsed">
      <div class="sidebar-header">
        <div>
          <div class="brand-kicker">Custom MTG Set</div>
          <h1 class="brand-title">Planechase</h1>
        </div>
        <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Close filters">
          ✕
        </button>
      </div>

      <div class="sidebar-content">
        <div class="filter-block">
          <label class="filter-label" for="sidebar-search">Search</label>
          <input id="sidebar-search" class="search-input" type="search" placeholder="Search cards..." />
        </div>

        <div class="filter-block">
          <div class="filter-heading-row">
            <h2 class="filter-heading">Type</h2>
            <button id="clear-type-filters" class="clear-inline-button" type="button">Clear</button>
          </div>

          <label class="checkbox-row">
            <input type="checkbox" class="type-filter" value="Plane" />
            <span>Plane</span>
          </label>

          <label class="checkbox-row">
            <input type="checkbox" class="type-filter" value="Phenomenon" />
            <span>Phenomenon</span>
          </label>
        </div>

        <div class="filter-block">
          <div class="filter-heading-row">
            <h2 class="filter-heading">Status</h2>
            <button id="clear-status-filters" class="clear-inline-button" type="button">Clear</button>
          </div>

          <label class="checkbox-row">
            <input type="checkbox" class="status-filter" value="complete" />
            <span>Complete</span>
          </label>

          <label class="checkbox-row">
            <input type="checkbox" class="status-filter" value="incomplete" />
            <span>WIP</span>
          </label>
        </div>

        <div class="filter-block">
          <div class="filter-heading-row">
            <h2 class="filter-heading">Tags</h2>
            <button id="clear-tag-filters" class="clear-inline-button" type="button">Clear</button>
          </div>
          <div id="tag-filter-list" class="tag-filter-list"></div>
        </div>

        <div class="filter-actions">
          <button id="clear-all-filters" class="clear-button" type="button">Clear all filters</button>
        </div>
      </div>
    </aside>

    <div id="sidebar-backdrop" class="sidebar-backdrop hidden" aria-hidden="true"></div>

    <div class="main-panel">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="topbar-left">
            <button id="topbar-sidebar-toggle" class="topbar-filter-button" type="button" aria-label="Open filters">
              ☰ Filters
            </button>

            <div class="topbar-copy">
              <div class="brand-kicker">Custom MTG Set</div>
              <h1 class="page-title">Planechase Gallery</h1>
              <p class="page-subtitle">Planes and Phenomena</p>
            </div>
          </div>

          <div class="topbar-controls">
            <input id="top-search" class="search-input search-input-large" type="search" placeholder="Search cards..." />
          </div>
        </div>
      </header>

      <main class="content">
        <section class="hero-card">
          <h2>Browse</h2>
          <p>
            Click any card to view it full-size. Use the filter drawer to narrow by type, status, tags, or name.
          </p>
        </section>

        <section class="gallery-section">
          <div class="section-header">
            <h2>Results</h2>
            <p id="results-count" class="section-meta"></p>
          </div>
          <div id="active-filters" class="active-filters"></div>
          <div id="gallery" class="card-grid"></div>
        </section>
      </main>
    </div>
  </div>

  <div id="card-modal" class="modal hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modal-card-name">
    <div class="modal-backdrop" data-close-modal="true"></div>

    <div class="modal-panel">
      <button id="modal-close" class="modal-close" type="button" aria-label="Close card viewer">×</button>

      <button id="modal-prev" class="modal-nav modal-prev" type="button" aria-label="Previous card">‹</button>
      <button id="modal-next" class="modal-nav modal-next" type="button" aria-label="Next card">›</button>

      <div class="modal-layout">
        <div class="modal-image-column">
          <img id="modal-image" class="modal-image" src="" alt="" />
          <a id="modal-source-link" class="modal-source-link" href="" target="_blank" rel="noopener noreferrer">
            Open full image
          </a>
        </div>

        <div class="modal-info-column">
          <div class="modal-header">
            <div>
              <p id="modal-card-type" class="modal-type"></p>
              <h2 id="modal-card-name" class="modal-name"></h2>
            </div>
            <div id="modal-card-badge" class="modal-status-badge"></div>
          </div>

          <div id="modal-tag-list" class="modal-tag-list"></div>

          <div class="modal-transcript-block">
            <h3>Card Text</h3>
            <pre id="modal-transcript" class="modal-transcript">No transcript available.</pre>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="gallery.js"></script>
</body>
</html>

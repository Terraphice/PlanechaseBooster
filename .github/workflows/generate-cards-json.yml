name: Generate cards.json

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-cards-json:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate cards.json and cardData.json
        run: node generateCards.js

      - name: Commit updated generated files
        run: |
          if git diff --quiet cards.json cardData.json; then
            echo "No changes to generated files"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards.json cardData.json
          git commit -m "Auto-update generated card data"
          git push
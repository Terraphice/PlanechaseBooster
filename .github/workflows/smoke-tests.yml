name: Smoke Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run smoke tests
        run: node scripts/smoke-test.js

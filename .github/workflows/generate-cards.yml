name: Generate Cards Database

on:
  push:
    branches:
      - main
    paths:
      - images/cards/**
      - generate-cards.js

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run generate-cards.js
        run: node generate-cards.js

      - name: Commit updated cards.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cards.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: regenerate cards.json from image files"
            git push
          fi
